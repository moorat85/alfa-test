<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alfa Business</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, sans-serif;
      background: #f2f2f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ─── iPhone shell (desktop only) ─── */
    .iphone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #000;
      border-radius: 54px;
      box-shadow:
        0 0 0 1.5px #3a3a3a,
        0 0 0 3px #1a1a1a,
        0 40px 120px rgba(0,0,0,0.4);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* Dynamic island */
    .iphone::before {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }

    .iphone-screen {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      border-radius: 54px;
    }
    .iphone-screen::-webkit-scrollbar { display: none; }

    /* ─── App content ─── */
    .app {
      width: 100%;
      min-height: 100%;
      background: #fff;
    }

    /* ─── Mobile: no iPhone shell ─── */
    @media (max-width: 440px) {
      body { background: #fff; align-items: flex-start; }
      .iphone {
        width: 100%;
        height: auto;
        background: transparent;
        border-radius: 0;
        box-shadow: none;
      }
      .iphone::before { display: none; }
      .iphone-screen {
        border-radius: 0;
        overflow: visible;
      }
    }
  </style>
</head>
<body>

  <div class="iphone">
    <div class="iphone-screen">
      <div class="app">
        <!-- screens go here -->
      </div>
    </div>
  </div>

</body>
</html>
